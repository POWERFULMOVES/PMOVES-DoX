# NATS Configuration for PMOVES-DoX
# TLS Mode: Set NATS_TLS_ENABLED=true to enable TLS
# Certificates: Mount to /etc/nats/certs/ (server.crt, server.key, ca.crt)

# Core NATS TLS (optional, enabled via environment)
# When enabled, clients must connect using nats+tls://
# tls {
#     cert_file: "/etc/nats/certs/server.crt"
#     key_file: "/etc/nats/certs/server.key"
#     ca_file: "/etc/nats/certs/ca.crt"
#     verify: false
# }

websocket {
    port: 9222
    # TLS disabled by default for local development
    # For distributed/production deployments:
    # 1. Generate certs: ./generate-certs.sh
    # 2. Mount certs in docker-compose
    # 3. Set no_tls: false and uncomment tls block below
    no_tls: true
    # tls {
    #     cert_file: "/etc/nats/certs/server.crt"
    #     key_file: "/etc/nats/certs/server.key"
    # }
    same_origin: false
}

jetstream {
    store_dir: "/data/jetstream"
}

# Authorization (optional for distributed deployments)
# authorization {
#     users: [
#         { user: "pmoves", password: "$NATS_PASSWORD" }
#     ]
# }
