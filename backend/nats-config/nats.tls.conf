# NATS Configuration for PMOVES-DoX distributed TLS deployments
# Requires certs generated by: ./backend/nats-config/generate-certs.sh

tls {
    cert_file: "/etc/nats/certs/server.crt"
    key_file: "/etc/nats/certs/server.key"
    ca_file: "/etc/nats/certs/ca.crt"
    verify: false
}

websocket {
    port: 9222
    no_tls: false
    tls {
        cert_file: "/etc/nats/certs/server.crt"
        key_file: "/etc/nats/certs/server.key"
    }
    same_origin: false
}

jetstream {
    store_dir: "/data/jetstream"
}

